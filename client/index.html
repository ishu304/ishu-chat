<!-- client/index.html -->

<!DOCTYPE html>
<html>
<head>

<title>Ishu Private Chat</title>

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<link
 rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

<style>

/* 🔥 LUXURY CAR STYLE FUTURE UI 🔥 */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:
    "Segoe UI",
    sans-serif;
}

body{

  height:100vh;

  overflow:hidden;

  background:
    linear-gradient(
      135deg,
      #050505,
      #111111,
      #1a1a1a,
      #050505
    );

  display:flex;
  justify-content:center;
  align-items:center;

}

/* APP */

.app{

  width:100%;
  max-width:430px;
  height:100vh;

  background:
    rgba(12,12,12,.96);

  border:
    1px solid rgba(255,255,255,.05);

  backdrop-filter:blur(25px);

  box-shadow:

    0 0 50px rgba(0,0,0,.8),
    inset 0 0 25px rgba(255,255,255,.03);

  display:flex;
  flex-direction:column;

  position:relative;
  overflow:hidden;

}

/* LUXURY GLOW */

.app::before{

  content:"";

  position:absolute;

  width:300px;
  height:300px;

  background:#00d2ff;

  filter:blur(140px);

  opacity:.12;

  top:-100px;
  left:-100px;

}

/* TOP */

.top{

  padding:20px;

  border-bottom:
    1px solid rgba(255,255,255,.06);

  background:
    linear-gradient(
      to bottom,
      rgba(25,25,25,.95),
      rgba(15,15,15,.9)
    );

  text-align:center;

  position:relative;

}

/* LOGO */

.logo{

  width:95px;
  height:95px;

  border-radius:50%;

  border:
    3px solid #00d2ff;

  box-shadow:

    0 0 20px #00d2ff,
    0 0 45px rgba(0,210,255,.6);

  margin-bottom:12px;

  animation:
    glow 2s infinite alternate;

}

@keyframes glow{

  from{

    box-shadow:
      0 0 10px #00d2ff;

  }

  to{

    box-shadow:
      0 0 35px #00d2ff,
      0 0 70px rgba(0,210,255,.8);

  }

}

/* TITLE */

.title{

  color:white;

  font-size:26px;
  font-weight:800;

  letter-spacing:1px;

  margin-bottom:12px;

  text-transform:uppercase;

}

/* ONLINE */

.onlineBox{

  color:#00ff9d;

  font-size:13px;

  margin-bottom:10px;

}

.users{

  color:#cfcfcf;

  font-size:11px;

  margin-top:4px;

  opacity:.7;

}

/* INPUT */

input{

  width:100%;

  padding:14px;

  margin-top:12px;

  border:none;
  outline:none;

  border-radius:16px;

  background:
    rgba(255,255,255,.04);

  border:
    1px solid rgba(255,255,255,.05);

  color:white;

  font-size:15px;

  transition:.3s;

}

input:focus{

  border:
    1px solid #00d2ff;

  box-shadow:
    0 0 20px rgba(0,210,255,.35);

  transform:scale(1.01);

}

/* JOIN BUTTON */

.joinBtn{

  width:100%;

  padding:14px;

  margin-top:14px;

  border:none;

  border-radius:16px;

  background:
    linear-gradient(
      45deg,
      #00c6ff,
      #0072ff
    );

  color:white;

  font-size:15px;
  font-weight:700;

  cursor:pointer;

  transition:.3s;

  box-shadow:
    0 0 20px rgba(0,114,255,.35);

}

.joinBtn:hover{

  transform:
    translateY(-2px)
    scale(1.01);

  box-shadow:
    0 0 35px rgba(0,114,255,.55);

}

/* CHAT */

#chat{

  flex:1;

  overflow:auto;

  padding:18px;

  display:flex;
  flex-direction:column;

  gap:14px;

  scroll-behavior:smooth;

}

/* MESSAGE */

.msg{

  max-width:84%;

  padding:14px;

  border-radius:22px;

  background:
    linear-gradient(
      145deg,
      rgba(255,255,255,.06),
      rgba(255,255,255,.03)
    );

  border:
    1px solid rgba(255,255,255,.04);

  color:white;

  backdrop-filter:blur(10px);

  box-shadow:
    0 8px 25px rgba(0,0,0,.35);

  animation:
    show .25s ease;

  transition:.3s;

  position:relative;

}

.msg:hover{

  transform:
    scale(1.02)
    translateY(-1px);

  box-shadow:
    0 12px 30px rgba(0,0,0,.5);

}

/* NAME */

.name{

  color:#00d2ff;

  font-size:13px;
  font-weight:700;

  margin-bottom:7px;

  letter-spacing:.5px;

}

/* TEXT */

.text{

  line-height:1.5;

  color:#f1f1f1;

  font-size:14px;

}

/* TIME */

.time{

  margin-top:8px;

  opacity:.55;

  font-size:11px;

}

/* BOTTOM */

.bottom{

  padding:14px;

  background:
    rgba(15,15,15,.95);

  border-top:
    1px solid rgba(255,255,255,.05);

}

/* SEND ROW */

.sendRow{

  display:flex;

  gap:10px;

}

.sendRow input{

  flex:1;

  margin-top:0;

}

/* SEND BUTTON */

.sendBtn{

  width:60px;

  border:none;

  border-radius:16px;

  background:
    linear-gradient(
      45deg,
      #00c6ff,
      #6a11cb
    );

  color:white;

  font-size:18px;

  cursor:pointer;

  transition:.3s;

  box-shadow:
    0 0 18px rgba(106,17,203,.35);

}

.sendBtn:hover{

  transform:scale(1.06);

  box-shadow:
    0 0 30px rgba(106,17,203,.6);

}

/* REMOVE ANIMATION */

.removeAnim{

  animation:
    removeMsg .35s ease forwards;

}

@keyframes removeMsg{

  from{

    opacity:1;

    transform:
      translateX(0)
      scale(1);

  }

  to{

    opacity:0;

    transform:
      translateX(80px)
      scale(.8);

  }

}

/* SHOW */

@keyframes show{

  from{

    opacity:0;

    transform:
      translateY(25px)
      scale(.9);

  }

  to{

    opacity:1;

    transform:
      translateY(0)
      scale(1);

  }

}

/* SCROLLBAR */

#chat::-webkit-scrollbar{

  width:5px;

}

#chat::-webkit-scrollbar-thumb{

  background:#00d2ff;

  border-radius:20px;

}

/* MOBILE */

@media(max-width:500px){

  .app{

    max-width:100%;
    height:100vh;

  }

}

</style>

</head>
<body>

<div class="app">

<div class="top">

<!-- <img
 class="logo"
 src="ChatGPT Image May 8, 2026, 10_04_00 PM.png"
/> -->

<div class="title">
 🔥 Ishu Private Chat
</div>

<div class="onlineBox">

  🟢 Online Users:
  <span id="count">0</span>

  <div
    class="users"
    id="users"
  >
  </div>

</div>

<input
 id="name"
 placeholder="Your Name"
/>

<input
 id="group"
 placeholder="Private Group ID"
/>

<button
 class="joinBtn"
 onclick="joinGroup()"
>
 <i class="fa-solid fa-lock"></i>
 Join Room
</button>

</div>

<div id="chat"></div>

<div class="bottom">

<div class="sendRow">

<input
 id="message"
 placeholder="Type secure message..."
/>

<button
 class="sendBtn"
 onclick="send()"
>
 <i class="fa-solid fa-paper-plane"></i>
</button>

</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let currentGroup = "";
let renderedMessages = [];

// JOIN
function joinGroup(){

  const name =
    document.getElementById("name")
    .value
    .trim();

  const group =
    document.getElementById("group")
    .value
    .trim();

  if(!name || !group){

    alert(
      "Enter Name & Group ID"
    );

    return;
  }

  currentGroup = group;

  socket.emit(
    "join_group",
    {
      name:name,
      group:group
    }
  );

}

// SEND
function send(){

  const name =
    document.getElementById("name")
    .value
    .trim();

  const message =
    document.getElementById("message")
    .value
    .trim();

  if(!message){

    return;
  }

  socket.emit(
    "send_message",
    {
      name:name,
      message:message,
      group:currentGroup
    }
  );

  document.getElementById(
    "message"
  ).value = "";

}

// ONLINE USERS
socket.on(
  "online_users",
  (users)=>{

    document.getElementById(
      "count"
    ).innerText =
      users.length;

    document.getElementById(
      "users"
    ).innerText =
      users.join(", ");

  }
);

// LOAD CHAT
socket.on(
  "load_messages",
  (msgs)=>{

    renderedMessages.forEach(
      oldMsg => {

      const exists =
        msgs.find(
          m => m.id === oldMsg.id
        );

      if(!exists){

        const el =
          document.getElementById(
            "msg-" + oldMsg.id
          );

        if(el){

          el.classList.add(
            "removeAnim"
          );

          setTimeout(()=>{

            el.remove();

          },300);

        }

      }

    });

    msgs.forEach(msg => {

      const already =
        document.getElementById(
          "msg-" + msg.id
        );

      if(!already){

        addMessage(msg);

      }

    });

    renderedMessages = msgs;

  }
);

// ADD MESSAGE
function addMessage(data){

  const chat =
    document.getElementById("chat");

  const div =
    document.createElement("div");

  div.className = "msg";

  div.id =
    "msg-" + data.id;

  const date =
    new Date(data.time);

  div.innerHTML = `

    <div class="name">
      ${data.name}
    </div>

    <div>
      ${data.message}
    </div>

    <div class="time">
      ${date.toLocaleTimeString()}
    </div>

  `;

  chat.appendChild(div);

  chat.scrollTop =
    chat.scrollHeight;

}

</script>

</body>
</html>
